name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kpi
          POSTGRES_PASSWORD: kpi
          POSTGRES_DB: kpi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kpi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://kpi:kpi@localhost:5432/kpi
      AUTH_SECRET: ci-dummy-secret-for-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run seed
      - run: npm test
      - run: npm run build
