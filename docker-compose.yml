# The Supabase stack (db, auth, rest, studio, …) runs separately via
# infra/supabase (docker compose up -d). For local dev, prefer running the
# Next.js app on the host (npm run dev) and connecting to Supabase services
# at localhost:8000 (Kong/API) and localhost:5432 (Postgres directly).
services:
  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CREDENTIALS_KEY: ${CREDENTIALS_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: ["3000:3000"]
    volumes:
      - .:/app
      - /app/node_modules
